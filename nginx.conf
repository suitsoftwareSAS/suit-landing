server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/manifest+json
        image/svg+xml
        font/truetype
        font/opentype
        font/woff
        font/woff2;

    # Hashed Astro build assets (JS, CSS) — safe to cache forever
    # Astro includes a content hash in every filename, so a new deploy = new filename
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public static assets without content hashes — cache for 7 days
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # HTML — always revalidate so users pick up new asset hashes on deploy
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback: serve index.html for unknown routes
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
